<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 48 48" fill="none">
  <!-- Modern background with gradient -->
  <rect width="48" height="48" fill="#0f172a"/>
  
  <!-- Bold background circle with gradient -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Main ascending arrow shaft (bold) -->
  <path
    d="M 24 36 L 24 12"
    stroke="#00d9ff"
    stroke-width="3.5"
    stroke-linecap="round"
  />
  
  <!-- Arrow head (dynamic triangle) -->
  <path
    d="M 24 12 L 18 20 L 30 20 Z"
    fill="#00d9ff"
  />
  
  <!-- Side acceleration lines for motion effect -->
  <path
    d="M 14 28 L 10 28"
    stroke="#0ff7ff"
    stroke-width="2.5"
    stroke-linecap="round"
    opacity="0.8"
  />
  <path
    d="M 14 20 L 8 20"
    stroke="#0ff7ff"
    stroke-width="2.5"
    stroke-linecap="round"
    opacity="0.6"
  />
  
  <!-- Dynamic accent - circular progress -->
  <path
    d="M 34 20 Q 38 24 34 28"
    stroke="#00d9ff"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
    opacity="0.7"
  />
</svg>
